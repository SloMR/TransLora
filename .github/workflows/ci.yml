name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (pytest, ${{ matrix.installer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        installer: [pip, uv]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.installer == 'pip'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cli/requirements.txt

      - name: Install dependencies (pip)
        if: matrix.installer == 'pip'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (pip)
        if: matrix.installer == 'pip'
        run: pytest

      - name: Install uv
        if: matrix.installer == 'uv'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: cli/pyproject.toml

      - name: Install dependencies (uv)
        if: matrix.installer == 'uv'
        run: uv sync --extra dev --python 3.12

      - name: Run tests (uv)
        if: matrix.installer == 'uv'
        run: uv run pytest

  web:
    name: Web (Karma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless
